<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Cloud -->
  <g fill="white">
    <circle cx="26" cy="30" r="10"/>
    <circle cx="38" cy="27" r="12"/>
    <circle cx="47" cy="33" r="9"/>
    <rect x="18" y="33" width="36" height="12" rx="6"/>
  </g>

  <!-- Rain -->
  <g stroke="#0077cc" stroke-width="3" stroke-linecap="round">
    <line x1="24" y1="50" x2="24" y2="56"/>
    <line x1="34" y1="50" x2="34" y2="56"/>
    <line x1="44" y1="50" x2="44" y2="56"/>
  </g>
</svg>