<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Home</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 320px;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 2rem;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: white;
      color: #0077cc;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #f0f0f0;
    }

    p {
      margin-top: 10px;
      opacity: 0.9;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌦 Weather Hub</h1>

    <a class="btn" href="https://jpickles.com/pwsWD/index.html">
      Open pwsWD
    </a>

    <a class="btn" href="https://jpickles.com/cutils/index.html">
      Open CumulusUtils
    </a>

    <p>Select a tool to continue</p>
  </div>

</body>
</html>
